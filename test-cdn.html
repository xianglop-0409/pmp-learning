<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMP 学习机 - 测试</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="topbar">
    <h1 class="app-title">PMP 联动学习机</h1>
  </header>
  <main class="main-content" id="mainContent" style="margin-left:0;">
    <div id="status" style="padding:40px;text-align:center;">
      <div class="spinner"></div>
      <p>正在加载 Dexie...</p>
    </div>
  </main>

  <script>
    // 动态加载 Dexie
    const s = document.createElement('script');
    s.src = 'https://unpkg.com/dexie@4/dist/dexie.min.js';
    s.onload = () => {
      document.getElementById('status').innerHTML = `
        <div style="font-size:48px;">✅</div>
        <h3>Dexie 加载成功！</h3>
        <p>Dexie version: ${Dexie.version || 'unknown'}</p>
        <p style="margin-top:12px;">CDN (unpkg.com) 可正常访问</p>
      `;
    };
    s.onerror = () => {
      document.getElementById('status').innerHTML = `
        <div style="font-size:48px;">❌</div>
        <h3>unpkg.com 加载失败</h3>
        <p>正在尝试 jsdelivr...</p>
      `;
      // 尝试 jsdelivr
      const s2 = document.createElement('script');
      s2.src = 'https://cdn.jsdelivr.net/npm/dexie@4/dist/dexie.min.js';
      s2.onload = () => {
        document.getElementById('status').innerHTML = `
          <div style="font-size:48px;">✅</div>
          <h3>Dexie 加载成功！（jsdelivr 备用）</h3>
          <p>unpkg 不可用，但 jsdelivr 可用</p>
        `;
      };
      s2.onerror = () => {
        document.getElementById('status').innerHTML = `
          <div style="font-size:48px;">❌</div>
          <h3>两个CDN都无法访问</h3>
          <p>unpkg.com 和 cdn.jsdelivr.net 均连接失败</p>
          <p style="margin-top:12px;color:#a0aec0;">建议使用VPN或代理后重试</p>
          <button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#6366f1;color:#fff;border:none;border-radius:6px;cursor:pointer;">🔄 重试</button>
        `;
      };
      document.head.appendChild(s2);
    };
    document.head.appendChild(s);
  </script>
</body>
</html>
